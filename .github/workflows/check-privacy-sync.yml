name: Check privacy sync

on:
  pull_request:
    paths:
      - 'index.html'
      - '.github/workflows/check-privacy-sync.yml'
  schedule:
    # Weekly drift check so we notice if AndroDR's privacy content
    # was updated without a matching site-repo sync PR.
    - cron: '17 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch renderer + markdown from AndroDR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/androdr
          for path in docs/PRIVACY_POLICY.md scripts/render_privacy.py scripts/requirements.txt; do
            out="/tmp/androdr/$(basename "$path")"
            gh api "repos/yasirhamza/AndroDR/contents/$path" --jq '.content' | base64 -d > "$out"
            test -s "$out" || { echo "::error::fetch failed: $path"; exit 1; }
          done

      - name: Install renderer dependencies
        run: python -m pip install -r /tmp/androdr/requirements.txt

      - name: Render into a copy and diff
        run: |
          cp index.html /tmp/index-expected.html
          python3 /tmp/androdr/render_privacy.py /tmp/androdr/PRIVACY_POLICY.md /tmp/index-expected.html
          if ! diff -q index.html /tmp/index-expected.html > /dev/null; then
            echo "::error::index.html is out of sync with AndroDR's docs/PRIVACY_POLICY.md"
            echo
            echo "Sync locally from an AndroDR checkout:"
            echo
            echo "    python3 /path/to/AndroDR/scripts/render_privacy.py /path/to/AndroDR/docs/PRIVACY_POLICY.md index.html"
            echo
            echo "Diff (truncated):"
            diff -u index.html /tmp/index-expected.html | head -80 || true
            exit 1
          fi
          echo "index.html is in sync with AndroDR's privacy markdown"
